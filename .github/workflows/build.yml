name: build

on:
  push:
    branches:
      - master
    tags:
      - v*
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-rust:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    # services:
    #   postgres:
    #     image: postgres:14.5
    #     env:
    #       POSTGRES_PASSWORD: postgres
    #     ports:
    #       - 5432:5432
    #     # Set health checks to wait until postgres has started
    #     options: >-
    #       --health-cmd pg_isready
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install Rust
        run: rustup toolchain install stable --component llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: install nextest
        uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
      # - name: Install Protoc
      #   uses: arduino/setup-protoc@v2

      # Dogfood the published action: install sbe and run the build/lint
      # steps inside the sandbox. nextest stays outside because the proxy
      # integration tests bind to random localhost TCP ports, which the
      # rust profile's port-based TCP filter (Landlock ABI v4) would block.
      - name: Install sbe (dogfood)
        uses: tyrchen/sbe@sbexec-v0.3.2
        with:
          version: '0.3.2'
      - name: sbe smoke
        run: |
          sbe --version
          sbe profiles >/dev/null

      - name: Check code format
        run: cargo fmt --all -- --check
      - name: Check the package for errors
        run: sbe run -- cargo check --all
      - name: Lint rust sources
        run: sbe run -- cargo clippy --all-targets --all-features --tests --benches -- -D warnings
      - name: Execute rust tests
        run: cargo nextest run --all-features
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        if: startsWith(github.ref, 'refs/tags/')
        with:
          config: cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body: ${{ steps.git-cliff.outputs.content }}
