name: release-cli

on:
  push:
    tags:
      - 'sbexec-v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md
      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.git-cliff.outputs.content }}

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: static musl binaries, run on Ubuntu.
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
          # macOS: dynamic-linked darwin binaries. macos-13 is the last
          # remaining Intel-x86_64 runner image; macos-latest is Apple
          # Silicon (aarch64-apple-darwin native).
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install sbe (dogfood)
        uses: tyrchen/sbe@sbexec-v0.3.0
        with:
          # Pin to the last released tag so we never try to install the
          # tag that is currently being released (its assets don't exist
          # yet when this job runs).
          version: sbexec-v0.3.0
      - name: Pre-flight cargo check under sbe (host target)
        run: sbe run -- cargo check --locked --manifest-path apps/cli/Cargo.toml
      - name: Build and upload binary to release
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: sbe
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          tar: all
          zip: none
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: refs/tags/${{ github.ref_name }}
          manifest_path: apps/cli/Cargo.toml
          locked: true
