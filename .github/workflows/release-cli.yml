name: release-cli

on:
  push:
    tags:
      - 'sbexec-v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md
      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.git-cliff.outputs.content }}

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: static musl binaries, run on Ubuntu.
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
          # macOS: dynamic-linked darwin binary on Apple Silicon.
          - target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Dogfood the published action before the real release build. On
      # native targets (host arch + std-libc) the cargo build inside sbe
      # warms taiki-e/upload-rust-binary-action's cache for the upload
      # step that follows. On cross-musl targets we skip the build (no
      # cross toolchain configured here) and fall back to `cargo check`
      # against the host, which still exercises the sandbox end-to-end.
      - name: Install sbe (dogfood)
        uses: tyrchen/sbe@sbexec-v0.3.2
        with:
          version: '0.3.2'
      - name: Pre-build under sbe (dogfood)
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          case "$TARGET" in
            aarch64-apple-darwin)
              rustup target add "$TARGET"
              sbe run -- cargo build --release --locked --target "$TARGET" \
                --manifest-path apps/cli/Cargo.toml
              ;;
            *)
              # x86_64/aarch64 musl on ubuntu need a musl/cross linker that
              # upload-rust-binary-action provisions internally — avoid
              # duplicating that here. A host-native `cargo check` still
              # gives us a real sbe workload to dogfood against.
              sbe run -- cargo check --locked \
                --manifest-path apps/cli/Cargo.toml
              ;;
          esac

      - name: Build and upload binary to release
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: sbe
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          tar: all
          zip: none
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: refs/tags/${{ github.ref_name }}
          manifest_path: apps/cli/Cargo.toml
          locked: true
