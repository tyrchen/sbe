name: test-cli

# Exercise `cargo install` and the major run-time situations the
# cross-platform-backend-design spec promises:
#   - `sbe --version` / `sbe profiles`
#   - `sbe inspect` and `sbe run --dry-run` (offline policy render)
#   - real `sbe run -- <cmd>` for a trivial command (online enforcement)
#   - `sbe run --allow-degraded` smoke when the kernel can't host ABI v4
#
# Runs on both Linux (Landlock + seccomp backend) and macOS (sandbox-exec).

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install-and-smoke:
    name: install + smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2

      - name: Build (workspace check)
        run: cargo check --workspace --all-targets

      - name: cargo install --path apps/cli
        run: cargo install --path apps/cli --locked --force

      - name: sbe --version
        run: sbe --version

      - name: sbe profiles (lists all 5 ecosystems)
        run: |
          set -euo pipefail
          out=$(sbe profiles)
          echo "$out"
          for eco in node rust python elixir java; do
            echo "$out" | grep -E "^=== ${eco} ===" >/dev/null || {
              echo "missing profile section: $eco"
              exit 1
            }
          done

      - name: sbe inspect renders deterministic policy (rust)
        run: |
          set -euo pipefail
          # `inspect` exits 0 and prints both the resolved profile (stderr)
          # and the platform policy (stdout). Capture stdout only.
          out=$(sbe inspect -- cargo build 2>/dev/null)
          test -n "$out"
          echo "$out" | head -40
          if [ "${{ runner.os }}" = "Linux" ]; then
            echo "$out" | grep -E "^backend: landlock\+seccomp" >/dev/null
            echo "$out" | grep -E "^landlockAbi: v[0-9]+" >/dev/null
            echo "$out" | grep -E "^seccomp:" >/dev/null
          else
            echo "$out" | grep -E "^\(version 1\)" >/dev/null
            echo "$out" | grep -E "^\(deny default\)" >/dev/null
          fi

      - name: sbe run --dry-run prints policy without spawning the child
        run: |
          set -euo pipefail
          # Use an arbitrary command name to exercise the ecosystem detect path.
          sbe run --dry-run -- echo hello >/tmp/sbe-dry.out 2>&1 || true
          test -s /tmp/sbe-dry.out
          head -20 /tmp/sbe-dry.out

      - name: sbe run -- /bin/echo hello (real sandbox)
        run: |
          set -euo pipefail
          out=$(sbe run --profile rust -- /bin/echo "hello from sbe")
          echo "got: $out"
          test "$out" = "hello from sbe"

      - name: sbe run -- /bin/sh -c "true" (proxy on, full sandbox)
        run: |
          set -euo pipefail
          # Spin up the rust profile (proxy on) and run a no-op shell.
          # Verifies pre_exec wiring on Linux, sandbox-exec wiring on macOS.
          sbe run --profile rust -- /bin/sh -c "true"

      - name: sbe run --allow-all-network -- (bypass proxy path)
        run: |
          set -euo pipefail
          sbe run --allow-all-network -- /bin/echo "bypass-ok"

      - name: sbe run --allow-degraded smoke (Linux only)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          # On modern GitHub-hosted Linux runners ABI v4 is available so this
          # flag is a no-op; we still verify it parses and the run completes.
          sbe run --allow-degraded --profile python -- /bin/echo "degraded-ok"

      - name: sbe run on a writable path (Rust profile + cargo --help)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          # Make sure the binary that's about to invoke cargo is itself
          # picked up by /usr/bin path; cargo lives in $HOME/.cargo/bin.
          sbe run --profile rust -- cargo --version

      - name: sbe run captures a sandbox denial via exit code
        run: |
          set -euo pipefail
          # /etc/shadow is not part of any default allowlist and is
          # explicitly outside the Linux baseline read anchors below /etc
          # only because it has 0600 perms; this is just a smoke that
          # commands run and that we don't crash the parent on EPERM.
          if [ "${{ runner.os }}" = "Linux" ]; then
            sbe run --profile rust -- /bin/sh -c "echo hi" >/tmp/sbe-allowed.out
            test "$(cat /tmp/sbe-allowed.out)" = "hi"
          fi
