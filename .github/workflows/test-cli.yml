name: test-cli

# Exercise `cargo install` and real ecosystem tools (cargo / npm / uv / mix)
# under sbe.
#
# Smoke install runs on Linux + macOS. The deeper ecosystem matrix
# (cargo/npm/uv/mix happy path + hostile fixture) is Linux-only because the
# macOS rust profile pins on rustup paths (~/.cargo/bin, ~/.rustup), but
# GH-hosted macOS runners may have a Homebrew rust/uv/node in PATH that
# resolves first — re-doing PATH discipline for every runner toolchain is
# out of scope here. The Linux backend is the one that's new in this PR
# and is fully exercised by the ecosystem-* jobs.

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: never

jobs:
  install:
    name: install + smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2

      - name: cargo install --path apps/cli
        run: cargo install --path apps/cli --locked --force

      - name: sbe --version
        run: sbe --version

      - name: sbe profiles (lists all 5 ecosystems)
        run: |
          set -euo pipefail
          out=$(sbe profiles)
          echo "$out"
          for eco in node rust python elixir java; do
            echo "$out" | grep -E "^=== ${eco} ===" >/dev/null || {
              echo "missing profile section: $eco"; exit 1; }
          done

      - name: sbe inspect renders deterministic policy (rust)
        run: |
          set -euo pipefail
          out=$(sbe inspect -- cargo build 2>/dev/null)
          test -n "$out"
          echo "$out" | head -40
          if [ "${{ runner.os }}" = "Linux" ]; then
            echo "$out" | grep -E "^backend: landlock\+seccomp" >/dev/null
            echo "$out" | grep -E "^landlockAbi: v[0-9]+" >/dev/null
            echo "$out" | grep -E "^seccomp:" >/dev/null
          else
            echo "$out" | grep -E "^\(version 1\)" >/dev/null
            echo "$out" | grep -E "^\(deny default\)" >/dev/null
          fi

      - name: sbe run --dry-run prints policy without spawning the child
        run: |
          set -euo pipefail
          sbe run --dry-run -- echo hello >/tmp/sbe-dry.out 2>&1 || true
          test -s /tmp/sbe-dry.out
          head -20 /tmp/sbe-dry.out

      - name: sbe run -- /bin/echo hello (real sandbox)
        run: |
          set -euo pipefail
          out=$(sbe run --profile rust -- /bin/echo "hello from sbe")
          echo "got: $out"
          test "$out" = "hello from sbe"

      - name: sbe run --allow-all-network -- /bin/echo (bypass proxy)
        run: |
          set -euo pipefail
          sbe run --allow-all-network -- /bin/echo "bypass-ok"

      - name: sbe run --allow-degraded smoke (Linux only)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sbe run --allow-degraded --profile python -- /bin/echo "degraded-ok"

  # The ecosystem-* jobs build a fresh "happy path" project for each language
  # and run the build tool through sbe. They also point sbe at the existing
  # hostile fixtures in /fixtures and assert the script's exfiltration
  # attempt is blocked (output must contain "🛡️ safe!", never "🚨 shit!").
  #
  # Linux-only: see the workflow header for why.
  ecosystem-rust:
    name: ecosystem / cargo
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
      - name: cargo install sbe
        run: cargo install --path apps/cli --locked --force

      - name: cargo build a fresh hello crate under sbe (happy path)
        run: |
          set -euo pipefail
          mkdir -p "$HOME/sbe-rust" && cd "$HOME/sbe-rust"
          rm -rf hello
          cargo init --name hello --bin hello
          cd hello
          sbe run --profile rust -- cargo build --offline 2>&1 | tee out.log
          grep -q "Compiling hello" out.log
          ./target/debug/hello | grep -q "Hello, world"

      - name: cargo build the hostile fixtures/rust crate — proves build.rs is sandboxed
        run: |
          set -euo pipefail
          cd fixtures/rust
          rm -rf target
          # The build script tries to read $HOME/.ssh/id_ed25519 and curl a
          # gist. Under sbe both must print "safe!" warnings, never "shit!".
          sbe run --profile rust -- cargo build 2>&1 | tee out.log
          if grep -q "shit" out.log; then
            echo "FAIL: hostile fixture exfiltration succeeded under sbe"
            exit 1
          fi
          grep -q "safe!" out.log || { echo "expected safe! warning"; exit 1; }

  ecosystem-node:
    name: ecosystem / npm
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
      - name: cargo install sbe
        run: cargo install --path apps/cli --locked --force
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install a small package under sbe (happy path)
        run: |
          set -euo pipefail
          mkdir -p "$HOME/sbe-node" && cd "$HOME/sbe-node"
          rm -rf happy && mkdir happy && cd happy
          cat > package.json <<'JSON'
          {"name":"happy","version":"0.0.1","dependencies":{"lodash":"4.17.21"}}
          JSON
          sbe run --profile node -- npm install --no-audit --no-fund 2>&1 | tee out.log
          test -d node_modules/lodash

      - name: npm install the hostile fixtures/node — preinstall must be sandboxed
        run: |
          set -euo pipefail
          cd fixtures/node
          rm -rf node_modules
          set +e
          sbe run --profile node -- npm install --no-audit --no-fund 2>&1 | tee out.log
          rc=$?
          set -e
          if grep -q "shit" out.log; then
            echo "FAIL: hostile npm script exfiltration succeeded under sbe"
            exit 1
          fi
          grep -q "safe!" out.log || { echo "expected safe! warning"; exit 1; }
          echo "npm exited with $rc — expected non-zero by fixture design"

  ecosystem-python:
    name: ecosystem / uv
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
      - name: cargo install sbe
        run: cargo install --path apps/cli --locked --force
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: uv pip install under sbe (happy path)
        run: |
          set -euo pipefail
          UV_BIN=$(command -v uv)
          UV_DIR=$(dirname "$UV_BIN")
          echo "uv at $UV_BIN (dir $UV_DIR)"
          mkdir -p "$HOME/sbe-uv" && cd "$HOME/sbe-uv"
          rm -rf happy && mkdir happy && cd happy
          uv venv .venv
          sbe run --profile python --allow-exec "$UV_DIR/" --allow-write "$UV_DIR/" -- \
            "$UV_BIN" pip install --python .venv --no-progress requests
          test -d .venv/lib

      - name: uv build the hostile fixtures/python — hatch hook must be sandboxed
        run: |
          set -euo pipefail
          UV_BIN=$(command -v uv)
          UV_DIR=$(dirname "$UV_BIN")
          cd fixtures/python
          rm -rf dist
          set +e
          sbe run --profile python --allow-exec "$UV_DIR/" --allow-write "$UV_DIR/" -- \
            "$UV_BIN" build --no-progress 2>&1 | tee out.log
          rc=$?
          set -e
          if grep -q "shit" out.log; then
            echo "FAIL: hostile python hook exfiltration succeeded under sbe"
            exit 1
          fi
          grep -q "safe!" out.log || { echo "expected safe! warning"; exit 1; }
          echo "uv build exited with $rc — expected non-zero by fixture design"

  ecosystem-elixir:
    name: ecosystem / mix
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
      - name: cargo install sbe
        run: cargo install --path apps/cli --locked --force
      - name: Install Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.17'

      - name: Resolve Erlang/Elixir paths
        id: beam
        run: |
          set -euo pipefail
          MIX_BIN=$(command -v mix)
          MIX_DIR=$(dirname "$MIX_BIN")
          # setup-beam installs Erlang to /home/runner/work/_temp/.setup-beam/otp/<rel>/.../bin/erl
          # and Elixir to ${MIX_DIR}; both directories need allowExec.
          ERL_BIN=$(command -v erl)
          ERL_DIR=$(dirname "$ERL_BIN")
          OTP_ROOT=$(dirname "$ERL_DIR")
          echo "mix-dir=$MIX_DIR" >> "$GITHUB_OUTPUT"
          echo "erl-dir=$ERL_DIR" >> "$GITHUB_OUTPUT"
          echo "otp-root=$OTP_ROOT" >> "$GITHUB_OUTPUT"
          echo "mix=$MIX_BIN" >> "$GITHUB_OUTPUT"
          echo "Resolved: mix=$MIX_BIN otp_root=$OTP_ROOT"

      - name: mix compile a fresh project under sbe (happy path)
        run: |
          set -euo pipefail
          mkdir -p "$HOME/sbe-mix" && cd "$HOME/sbe-mix"
          rm -rf happy
          mix new happy --module Happy
          cd happy
          sbe run --profile elixir \
            --allow-exec '${{ steps.beam.outputs.mix-dir }}/' \
            --allow-exec '${{ steps.beam.outputs.erl-dir }}/' \
            --allow-exec '${{ steps.beam.outputs.otp-root }}/' \
            --allow-write '${{ steps.beam.outputs.otp-root }}/' \
            -- '${{ steps.beam.outputs.mix }}' compile 2>&1 | tee out.log
          grep -qE "(Compiled|Generated happy)" out.log

      - name: mix on the hostile fixtures/elixir — top-level read+curl must be sandboxed
        run: |
          set -euo pipefail
          cd fixtures/elixir
          rm -rf _build deps
          set +e
          sbe run --profile elixir \
            --allow-exec '${{ steps.beam.outputs.mix-dir }}/' \
            --allow-exec '${{ steps.beam.outputs.erl-dir }}/' \
            --allow-exec '${{ steps.beam.outputs.otp-root }}/' \
            --allow-write '${{ steps.beam.outputs.otp-root }}/' \
            -- '${{ steps.beam.outputs.mix }}' compile 2>&1 | tee out.log
          rc=$?
          set -e
          if grep -q "shit" out.log; then
            echo "FAIL: hostile mix script exfiltration succeeded under sbe"
            exit 1
          fi
          grep -q "safe!" out.log || { echo "expected safe! warning"; exit 1; }
          echo "mix compile exited with $rc"
