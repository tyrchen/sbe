name: test-cli

# Exercise `cargo install` and real ecosystem tools (cargo / npm / uv / mix)
# under sbe on both Linux (Landlock + seccomp) and macOS (sandbox-exec).
#
# The fixtures in /fixtures are intentionally hostile: their build scripts
# try to read $HOME/.ssh/id_ed25519 and curl a gist. Under sbe they must
# log "🛡️ safe!" — never "🚨 shit!".

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: never

jobs:
  install:
    name: install + smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2

      - name: cargo install --path apps/cli
        run: cargo install --path apps/cli --locked --force

      - name: sbe --version
        run: sbe --version

      - name: sbe profiles (lists all 5 ecosystems)
        run: |
          set -euo pipefail
          out=$(sbe profiles)
          echo "$out"
          for eco in node rust python elixir java; do
            echo "$out" | grep -E "^=== ${eco} ===" >/dev/null || {
              echo "missing profile section: $eco"; exit 1; }
          done

      - name: sbe inspect renders deterministic policy (rust)
        run: |
          set -euo pipefail
          out=$(sbe inspect -- cargo build 2>/dev/null)
          test -n "$out"
          echo "$out" | head -40
          if [ "${{ runner.os }}" = "Linux" ]; then
            echo "$out" | grep -E "^backend: landlock\+seccomp" >/dev/null
            echo "$out" | grep -E "^landlockAbi: v[0-9]+" >/dev/null
            echo "$out" | grep -E "^seccomp:" >/dev/null
          else
            echo "$out" | grep -E "^\(version 1\)" >/dev/null
            echo "$out" | grep -E "^\(deny default\)" >/dev/null
          fi

      - name: sbe run --dry-run prints policy without spawning the child
        run: |
          set -euo pipefail
          sbe run --dry-run -- echo hello >/tmp/sbe-dry.out 2>&1 || true
          test -s /tmp/sbe-dry.out
          head -20 /tmp/sbe-dry.out

      - name: sbe run -- /bin/echo hello (real sandbox)
        run: |
          set -euo pipefail
          out=$(sbe run --profile rust -- /bin/echo "hello from sbe")
          echo "got: $out"
          test "$out" = "hello from sbe"

      - name: sbe run --allow-all-network -- /bin/echo (bypass proxy)
        run: |
          set -euo pipefail
          sbe run --allow-all-network -- /bin/echo "bypass-ok"

      - name: sbe run --allow-degraded (Linux only — smoke)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          # ABI v4 is present on ubuntu-latest 6.x, so this flag is a no-op
          # but we verify it parses and the run completes.
          sbe run --allow-degraded --profile python -- /bin/echo "degraded-ok"

  ecosystem-rust:
    name: ecosystem / cargo (${{ matrix.os }})
    needs: install
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
      - name: cargo install sbe
        run: cargo install --path apps/cli --locked --force

      - name: cargo build a fresh hello crate under sbe
        run: |
          set -euo pipefail
          mkdir -p /tmp/sbe-rust && cd /tmp/sbe-rust
          rm -rf hello
          cargo init --name hello --bin hello
          sbe run --profile rust -- cargo build --offline 2>&1 | tee out.log
          grep -q "Compiling hello" out.log
          ./target/debug/hello | grep -q "Hello, world"

      - name: cargo build of the hostile fixtures/rust crate — proves build.rs is sandboxed
        run: |
          set -euo pipefail
          cd fixtures/rust
          rm -rf target
          # The build script tries to read $HOME/.ssh/id_ed25519 and curl a
          # gist. Under sbe both must print "safe!" warnings, never "shit!".
          sbe run --profile rust -- cargo build 2>&1 | tee out.log
          if grep -q "🚨 shit" out.log; then
            echo "FAIL: hostile fixture exfiltration succeeded under sbe"
            exit 1
          fi
          grep -q "🛡️ safe!" out.log || { echo "expected safe! warning"; exit 1; }

  ecosystem-node:
    name: ecosystem / npm (${{ matrix.os }})
    needs: install
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
      - name: cargo install sbe
        run: cargo install --path apps/cli --locked --force
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install a fresh package under sbe (happy path)
        run: |
          set -euo pipefail
          mkdir -p /tmp/sbe-node && cd /tmp/sbe-node
          rm -rf happy && mkdir happy && cd happy
          cat > package.json <<'JSON'
          {"name":"happy","version":"0.0.1","dependencies":{"lodash":"4.17.21"}}
          JSON
          sbe run --profile node -- npm install --no-audit --no-fund 2>&1 | tee out.log
          test -d node_modules/lodash

      - name: npm install of the hostile fixtures/node — preinstall must be sandboxed
        run: |
          set -euo pipefail
          cd fixtures/node
          rm -rf node_modules
          # The preinstall script tries to read SSH keys. npm exits non-zero
          # because the script exits 1 either way — we assert the OUTPUT
          # shows "safe!" not "shit!".
          set +e
          sbe run --profile node -- npm install --ignore-scripts=false --no-audit --no-fund 2>&1 | tee out.log
          rc=$?
          set -e
          if grep -q "🚨 shit" out.log; then
            echo "FAIL: hostile npm script exfiltration succeeded under sbe"
            exit 1
          fi
          grep -q "🛡️ safe!" out.log || { echo "expected safe! warning"; exit 1; }
          # npm exiting non-zero here is expected (the check.js always exits 1)
          echo "npm exited with $rc — expected non-zero due to fixture design"

  ecosystem-python:
    name: ecosystem / uv (${{ matrix.os }})
    needs: install
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
      - name: cargo install sbe
        run: cargo install --path apps/cli --locked --force
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: uv pip install a small package under sbe (happy path)
        run: |
          set -euo pipefail
          mkdir -p /tmp/sbe-uv && cd /tmp/sbe-uv
          rm -rf happy && mkdir happy && cd happy
          # Create a venv outside sbe — venv creation needs to touch many
          # paths and is exercised below in the hostile fixture run too.
          uv venv .venv
          # Then use sbe to drive pip install — verifies proxy + cargo-style
          # ecosystem detect kicks in for `uv`.
          sbe run --profile python -- uv pip install --python .venv --no-progress requests
          test -d .venv/lib

      - name: uv build the hostile fixtures/python — hatch hook must be sandboxed
        run: |
          set -euo pipefail
          cd fixtures/python
          rm -rf dist
          set +e
          sbe run --profile python -- uv build --no-progress 2>&1 | tee out.log
          rc=$?
          set -e
          if grep -q "🚨 shit" out.log; then
            echo "FAIL: hostile python hook exfiltration succeeded under sbe"
            exit 1
          fi
          grep -q "🛡️ safe!" out.log || { echo "expected safe! warning"; exit 1; }
          echo "uv build exited with $rc — expected non-zero due to fixture design"

  ecosystem-elixir:
    name: ecosystem / mix (${{ matrix.os }})
    needs: install
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2
      - name: cargo install sbe
        run: cargo install --path apps/cli --locked --force

      - name: Install Erlang/Elixir (Linux)
        if: runner.os == 'Linux'
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.17'

      - name: Install Erlang/Elixir (macOS via Homebrew)
        if: runner.os == 'macOS'
        run: brew install elixir

      - name: mix compile a fresh project under sbe (happy path)
        run: |
          set -euo pipefail
          mkdir -p /tmp/sbe-mix && cd /tmp/sbe-mix
          rm -rf happy
          mix new happy --module Happy
          cd happy
          sbe run --profile elixir -- mix compile 2>&1 | tee out.log
          grep -qE "(Compiled|Generated happy)" out.log

      - name: mix on the hostile fixtures/elixir — top-level read+curl must be sandboxed
        run: |
          set -euo pipefail
          cd fixtures/elixir
          rm -rf _build deps
          set +e
          sbe run --profile elixir -- mix compile 2>&1 | tee out.log
          rc=$?
          set -e
          if grep -q "🚨 shit" out.log; then
            echo "FAIL: hostile mix script exfiltration succeeded under sbe"
            exit 1
          fi
          grep -q "🛡️ safe!" out.log || { echo "expected safe! warning"; exit 1; }
          echo "mix compile exited with $rc"
