# sbe built-in default profiles.
# Embedded into the binary at compile time via include_str!.
# Paths support ~ (home dir) and $PWD (working directory) placeholders.

common:
  denyRead:
    # SSH / GPG
    - "~/.ssh"
    - "~/.gnupg"
    # Cloud credentials
    - "~/.aws"
    - "~/.azure"
    - "~/.config/gcloud"
    - "~/.kube/config"
    # macOS Keychain
    - "~/Library/Keychains"
    # Container / registry auth
    - "~/.docker/config.json"
    - "~/.netrc"
    # Package manager tokens (prevent exfiltration of publish credentials)
    - "~/.npmrc"
    - "~/.cargo/credentials.toml"
    - "~/.cargo/credentials"
    - "~/.pypirc"
    - "~/.hex/hex_api_key"
    - "~/.config/gh"
    # Environment secrets
    - "$PWD/.env"
    - "$PWD/.env.local"
    - "$PWD/.env.production"
    # Browser profiles (cookies, saved passwords)
    - "~/Library/Application Support/Google/Chrome"
    - "~/Library/Application Support/Firefox"
    - "~/Library/Application Support/Microsoft Edge"
    - "~/Library/Application Support/BraveSoftware/Brave-Browser"
    - "~/Library/Safari"

  denyExec:
    - "/usr/bin/osascript"
    - "/usr/bin/security"
    - "/usr/sbin/screencapture"
    - "/usr/bin/open"
    - "/usr/bin/pbcopy"
    - "/usr/bin/pbpaste"

  allowExec:
    # Shells
    - "/bin/sh"
    - "/bin/bash"
    - "/bin/zsh"
    - "/usr/bin/env"
    # Core utilities used by build scripts
    - "/usr/bin/basename"
    - "/usr/bin/dirname"
    - "/usr/bin/cat"
    - "/usr/bin/head"
    - "/usr/bin/tail"
    - "/usr/bin/cut"
    - "/usr/bin/tr"
    - "/usr/bin/sed"
    - "/usr/bin/awk"
    - "/usr/bin/grep"
    - "/usr/bin/sort"
    - "/usr/bin/uniq"
    - "/usr/bin/wc"
    - "/usr/bin/tee"
    - "/usr/bin/xargs"
    - "/usr/bin/find"
    - "/usr/bin/touch"
    - "/usr/bin/mktemp"
    - "/usr/bin/install"
    - "/usr/bin/test"
    - "/usr/bin/expr"
    - "/usr/bin/printf"
    - "/bin/cp"
    - "/bin/mv"
    - "/bin/rm"
    - "/bin/mkdir"
    - "/bin/rmdir"
    - "/bin/ln"
    - "/bin/ls"
    - "/bin/cat"
    - "/bin/chmod"
    - "/bin/date"
    - "/bin/echo"
    - "/bin/test"
    - "/bin/expr"
    - "/bin/dd"
    # Archive / compression
    - "/usr/bin/tar"
    - "/usr/bin/gzip"
    - "/usr/bin/bzip2"
    - "/usr/bin/unzip"
    - "/usr/bin/zip"
    # Build toolchain
    - "/usr/bin/make"
    - "/usr/bin/cc"
    - "/usr/bin/ar"
    - "/usr/bin/ranlib"
    - "/usr/bin/strip"
    - "/usr/bin/ld"
    - "/usr/bin/as"
    - "/usr/bin/nm"
    - "/usr/bin/libtool"
    - "/usr/bin/install_name_tool"
    # Zig — pure compiler/linker, no network access.
    - "/opt/homebrew/bin/zig"
    - "/usr/local/bin/zig"
    # Xcode / Command Line Tools (cc linker resolves to clang here)
    - "/Applications/Xcode.app"
    - "/Library/Developer/CommandLineTools"
    # cmake — needed by aws-lc-sys, many native deps
    - "/opt/homebrew/bin/cmake"
    - "/usr/local/bin/cmake"
    # pkg-config — needed by many native deps
    - "/opt/homebrew/bin/pkg-config"
    - "/usr/local/bin/pkg-config"
    # Temp directories — build tools (cargo-zigbuild, cc-rs) create and
    # execute wrapper scripts here. Safe: scripts inherit the same sandbox.
    - "/private/tmp"
    - "/private/var/folders"

profiles:
  node:
    allowWrite:
      - "$PWD"
      - "~/.npm"
      - "~/.cache/yarn"
      - "~/.local/share/pnpm"
      - "~/.bun"
      - "~/.cache/bun"
    allowDomains:
      - "registry.npmjs.org"
      - "registry.yarnpkg.com"
      - "registry.npmmirror.com"
      - "github.com"
      - "codeload.github.com"
      - "objects.githubusercontent.com"
    allowExec:
      - "$PWD/node_modules"
      - "/usr/local/bin/node"
      - "/opt/homebrew/bin/node"
      - "~/.nvm"
      - "~/.volta"
      - "~/.fnm"
      - "~/.local/share/fnm"
      - "~/.local/state/fnm_multishells"
      - "/usr/bin/xcodebuild"
      - "/usr/bin/xcrun"

  rust:
    allowWrite:
      - "$PWD"
      - "~/.cargo/registry"
      - "~/.cargo/git"
      # NOTE: ~/.cargo/bin is NOT writable — prevents trojaning cargo binaries.
      # Use `cargo install` outside the sandbox for that.
      - "~/.rustup"
      # cargo-zigbuild writes linker wrapper scripts here
      - "~/Library/Caches/cargo-zigbuild"
      # zig compiler cache
      - "~/.cache/zig"
    allowDomains:
      - "crates.io"
      - "static.crates.io"
      - "index.crates.io"
      - "static.rust-lang.org"
      - "github.com"
      - "codeload.github.com"
      - "objects.githubusercontent.com"
    allowExec:
      - "~/.cargo/bin"
      - "~/.rustup/toolchains"
      - "/usr/bin/xcrun"
      - "/usr/bin/xcodebuild"
      # cargo-zigbuild linker wrapper scripts
      - "~/Library/Caches/cargo-zigbuild"

  python:
    allowWrite:
      - "$PWD"
      - "~/.cache/pip"
      - "~/.cache/uv"
      - "~/.local/lib"
      # NOTE: ~/.local/bin is NOT writable — prevents trojaning user binaries.
      # Use `pip install` outside the sandbox for global tool installs.
      - "$PWD/.venv"
      - "$PWD/venv"
    allowDomains:
      - "pypi.org"
      - "files.pythonhosted.org"
      - "github.com"
      - "codeload.github.com"
      - "objects.githubusercontent.com"
    allowExec:
      # System python
      - "/usr/bin/python3"
      # Homebrew python — specific binaries, NOT the entire /opt/homebrew/bin
      - "/opt/homebrew/bin/python3"
      - "/opt/homebrew/bin/pip3"
      - "/opt/homebrew/bin/uv"
      - "/usr/local/bin/python3"
      - "/usr/local/bin/pip3"
      - "/usr/local/bin/uv"
      # Version managers
      - "~/.pyenv"
      - "~/.local/bin"
      # Virtual env binaries within project
      - "$PWD/.venv"
      - "$PWD/venv"

  elixir:
    allowWrite:
      - "$PWD"
      - "~/.hex"
      - "~/.mix"
      - "~/.cache/rebar3"
    allowDomains:
      - "hex.pm"
      - "repo.hex.pm"
      - "builds.hex.pm"
      - "github.com"
      - "codeload.github.com"
      - "objects.githubusercontent.com"
    allowExec:
      - "/usr/local/bin/elixir"
      - "/usr/local/bin/mix"
      - "/usr/local/bin/erl"
      - "/opt/homebrew/bin/elixir"
      - "/opt/homebrew/bin/mix"
      - "/opt/homebrew/bin/erl"
      - "~/.asdf"
      - "~/.kiex"

  java:
    allowWrite:
      - "$PWD"
      - "~/.m2/repository"
      - "~/.gradle/caches"
      - "~/.gradle/wrapper"
      - "$PWD/.gradle"
      - "$PWD/build"
      - "$PWD/target"
    allowDomains:
      - "repo1.maven.org"
      - "repo.maven.apache.org"
      - "plugins.gradle.org"
      - "services.gradle.org"
      - "downloads.gradle-dn.com"
      - "jcenter.bintray.com"
      - "github.com"
      - "codeload.github.com"
      - "objects.githubusercontent.com"
    allowExec:
      - "/usr/bin/java"
      - "/usr/libexec/java_home"
      - "/opt/homebrew/opt/openjdk"
      - "~/.sdkman"
